version: "3.9"


services:
  prometheus:
    image: prom/prometheus:v2.51.0

    container_name: jobqueue-prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - api

    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.0

    container_name: jobqueue-grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"

      GF_SECURITY_ALLOW_EMBEDDING: "true"

      GF_USERS_ALLOW_SIGN_UP: "false"

      GF_INSTALL_PLUGINS: "grafana-clock-panel"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

    depends_on:
      - prometheus
      - loki

    networks:
      - backend

  flower:
    image: mher/flower:2.0

    container_name: jobqueue-flower

    restart: unless-stopped

    ports:
      - "5555:5555"

    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_UNAUTHENTICATED_API: "true"

    command:
      - "celery"
      - "--broker=redis://redis:6379/0"
      - "flower"
      - "--port=5555"

    depends_on:
      - redis

    networks:
      - backend

  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0

    container_name: jobqueue-redis-exporter

    restart: unless-stopped

    environment:
      REDIS_ADDR: redis://redis:6379

    depends_on:
      - redis

    networks:
      - backend

  mongodb_exporter:
    image: percona/mongodb_exporter:0.40

    container_name: jobqueue-mongodb-exporter

    restart: unless-stopped

    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/admin?ssl=false

    command:
      - "--collect-all"

    depends_on:
      - mongodb

    networks:
      - backend

  loki:
    image: grafana/loki:2.9.0

    container_name: jobqueue-loki

    restart: unless-stopped

    ports:
      - "3100:3100"

    volumes:
      - loki_data:/loki

    command:
      - "-config.file=/etc/loki/local-config.yaml"

    networks:
      - backend

  promtail:
    image: grafana/promtail:2.9.0

    container_name: jobqueue-promtail

    restart: unless-stopped

    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro 
      - promtail_data:/tmp/positions

    command:
      - "-config.file=/etc/promtail/config.yml"
    depends_on:
      - loki

    networks:
      - backend

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  promtail_data:
    driver: local

networks:
  backend:
    driver: bridge