name: App-CI 

on:
  push:
    paths:
      - 'app/**'
    branches:
      - main

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest bandit safety
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Lint with Ruff
        run: ruff check .
        continue-on-error: true
      
      - name: SAST Scan (Bandit)
        run: bandit -r . -ll -ii
        continue-on-error: true
      
      - name: Dependency Audit (Safety)
        run: safety check
        continue-on-error: true
      
      - name: Run Tests (Pytest)
        run: pytest
        continue-on-error: true
  
  call-security-pipeline:
    uses: ./.github/workflows/security-pipeline.yml
    needs: test-and-audit
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      image_name: "jobqueue-api"
      context: .
    secrets: inherit

  