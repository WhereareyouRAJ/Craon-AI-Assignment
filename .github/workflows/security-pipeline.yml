name: Security Pipeline 

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: craon-core
  IMAGE_TAG: ${{ github.sha }}
jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx(Multi-Arch)
        uses: docker/setup-buildx-action@v4
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
    
      
      
      - name: Update Inventory
        run: |
          echo "TIME: $(date)" >> release.log
          echo "IMAGE: ${{ inputs.image_name }}" >> release.log
          echo "DIGEST: ${{ steps.build_step.outputs.digest }}" >> release.log
          echo "SBOM_ID: ${{ steps.build_step.outputs.metadata }}" >> release.log
          
      - name: Upload release log
        uses: actions/upload-artifact@v4
        with:
          name: inventory-${{ inputs.image_name }}
          path: release.log
